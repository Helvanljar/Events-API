name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d --name events-api-container -p 5000:5000 events-api:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Health check
        run: curl --fail http://localhost:5000/api/health

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Stop container
        if: always()
        run: docker stop events-api-container

      - name: Remove container
        if: always()
        run: docker rm events-api-container